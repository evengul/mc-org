name: Deploy to dev and test E2E
on:
  pull_request:
    branches: [ master ]
jobs:
  create-neon-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: neondatabase/create-branch-action@v5
        id: create-branch
        with:
          project_id: morning-fog-11467472
          parent: master
          database: mcorg
          branch_name: ${{ github.head_ref || github.ref_name }}
          username: mcorg_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          suspend_timeout: 500
  push-to-fly:
    name: "Push app to fly dev environment"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./webapp
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '21'
      - name: Run flyway migrations
        run: mvn flyway:migrate
        env:
          DB_URL: ${{ steps.create-neon-branch.outputs.db_url_with_pooler }}
          DB_USER: mcorg_owner
          DB_PASSWORD: ${{ steps.create-neon-branch.outputs.password }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only -c dev.fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  playwright-tests:
    name: "E2E Playwright Tests"
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./webapp/src/test/javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
