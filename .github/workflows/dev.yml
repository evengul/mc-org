# Reference: https://github.com/neondatabase-labs/preview-branches-with-fly/blob/main/.github/workflows/deploy-preview.yml

name: Deploy to dev and test E2E
env:
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }} # You can generate a Fly API token in your account settings
  GH_TOKEN: ${{ secrets.GH_TOKEN }} # Required for commenting on pull requests for private repos
  DB_USERNAME: mcorg_owner
on:
  pull_request:
    branches: [ master ]
jobs:
  deploy-dev:
    environment: dev
    runs-on: ubuntu-latest
    concurrency:
      group: pr-${{ github.event.number }}
    defaults:
      run:
        working-directory: ./webapp
    steps:
      - uses: actions/checkout@v4
      - uses: neondatabase/create-branch-action@v5
        id: create-neon-branch
        with:
          project_id: morning-fog-11467472
          database: mcorg
          branch_name: dev/${{ github.head_ref || github.ref_name }}
          username: ${{ env.DB_USERNAME }}
          api_key: ${{ secrets.NEON_API_KEY }}
      - run: |
          echo "DB_URL_POOLED=${{ steps.create-branch.outputs.db_url_with_pooler }}" >> "$GITHUB_ENV"
      - run: |
          echo "DB_URL=${{ steps.create-branch.outputs.db_url }}" >> "$GITHUB_ENV"
      - run: |
          echo "DB_PASSWORD=${{ steps.create-branch.outputs.password }}" >> "$GITHUB_ENV"
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '21'
      - name: Run flyway migrations
        run: mvn flyway:migrate
        env:
          DB_URL: "jdbc:${{ env.DB_URL }}"
          DB_USER: ${{ env.DB_USERNAME }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
      - uses: superfly/fly-pr-review-apps@1.2.1
        id: deploy
        with:
          config: dev.fly.toml
          secrets: DB_PASSWORD=$DB_PASSWORD DB_URL=jdbc:$DB_URL_POOLED DB_USERNAME=${{ env.DB_USERNAME }}
      - name: Comment on Pull Request
        uses: thollander/actions-comment-pull-request@v2
        with:
          GITHUB_TOKEN: ${{ env.GH_TOKEN }}
          message: |
            Fly Preview URL :balloon: : ${{ steps.deploy.outputs.url }}
            Neon branch :elephant: : https://console.neon.tech/app/projects/${{ env.NEON_PROJECT_ID }}/branches/${{ steps.create-branch.outputs.branch_id }}
  playwright-tests:
    name: "E2E Playwright Tests"
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs:
      - deploy-dev
    defaults:
      run:
        working-directory: ./webapp/src/test/javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
