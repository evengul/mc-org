name: Fly Deploy Webapp
on:
  push:
    branches:
      - master
    paths:
      - webapp/mc-domain/src/main/**
      - webapp/mc-engine/src/main/**
      - webapp/mc-nbt/src/main/**
      - webapp/mc-pipeline/src/main/**
      - webapp/mc-data/src/main/**
      - webapp/mc-web/src/main/**
      - webapp/pom.xml
      - webapp/*/pom.xml
      - webapp/Dockerfile
permissions:
  contents: read

jobs:
  compile:
    uses: ./.github/workflows/compile.yml

  deploy:
    name: Deploy app
    needs: compile
    runs-on: ubuntu-latest
    concurrency: deploy-group
    defaults:
      run:
        working-directory: ./webapp
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-
      - name: Restore local Maven artifacts
        uses: actions/download-artifact@v8
        with:
          name: maven-local-modules
          path: ~/.m2/repository/app/mcorg
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'adopt'
          java-version: '21'

      - name: Run Flyway migrations
        run: mvn flyway:migrate
        working-directory: ./webapp/mc-web
        env:
          DB_URL: ${{ vars.DB_URL }}
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Download application JAR
        uses: actions/download-artifact@v8
        with:
          name: app-jar
          path: ./jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./jar
          file: ./webapp/Dockerfile.ci
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max

      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --image ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
