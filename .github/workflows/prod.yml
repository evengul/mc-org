name: Fly Deploy Webapp
on:
  push:
    branches:
      - master
    paths:
      - webapp/mc-domain/src/main/**
      - webapp/mc-engine/src/main/**
      - webapp/mc-nbt/src/main/**
      - webapp/mc-pipeline/src/main/**
      - webapp/mc-data/src/main/**
      - webapp/mc-web/src/main/**
      - webapp/pom.xml
      - webapp/*/pom.xml
      - webapp/Dockerfile
permissions:
  contents: read

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    defaults:
      run:
        working-directory: ./webapp
    environment: production
    steps:
      - uses: actions/checkout@v6
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'adopt'
          java-version: '21'

      - name: Install modules
        run: mvn install -DskipTests -B
      - name: Run Flyway migrations
        run: mvn flyway:migrate
        working-directory: ./webapp/mc-web
        env:
          DB_URL: ${{ vars.DB_URL }}
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --build-arg BUILDKIT_INLINE_CACHE=1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DOCKER_BUILDKIT: 1
