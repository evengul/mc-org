name: Clean up Preview Deployment
on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    paths:
      - webapp/mc-domain/src/main/**
      - webapp/mc-engine/src/main/**
      - webapp/mc-nbt/src/main/**
      - webapp/mc-pipeline/src/main/**
      - webapp/mc-data/src/main/**
      - webapp/mc-web/src/main/**
      - webapp/pom.xml
      - webapp/*/pom.xml
      - webapp/Dockerfile

permissions: {}

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }} # You can generate a Fly API token in your account settings

jobs:
  delete-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Fly app
        uses: superfly/fly-pr-review-apps@1.5.0
        with:
          name: mcorg-dev-${{ github.event.number }}
          org: mc-org
  delete-neon:
    runs-on: ubuntu-22.04
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3.2.0
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: dev/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
