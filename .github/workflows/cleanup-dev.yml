name: Clean up Preview Deployment
on:
  workflow_dispatch:
  pull_request:
    # No paths filter: the `preview` label (gated per-job below) is the single source
    # of truth for "this PR has a preview to tear down". A previewed PR always carries
    # the label, so cleanup fires on close regardless of which files it touched.
    types: [closed]

permissions: {}

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }} # You can generate a Fly API token in your account settings

jobs:
  delete-preview:
    # Only PRs that actually got a preview deploy (the `preview` label, per dev.yml's
    # gate) have a Fly app / Neon branch to delete. Without this, closing any other
    # paths-matching PR fails trying to delete resources that never existed.
    # workflow_dispatch has no PR context, so allow manual runs through unconditionally.
    if: >-
      github.event_name == 'workflow_dispatch'
      || contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-latest
    steps:
      - name: Delete Fly app
        uses: superfly/fly-pr-review-apps@1.6.0
        with:
          name: mcorg-dev-${{ github.event.number }}
          org: mc-org
  delete-neon:
    if: >-
      github.event_name == 'workflow_dispatch'
      || contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-22.04
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3.2.1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: dev/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
