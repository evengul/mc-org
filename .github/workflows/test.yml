name: Test

on:
  pull_request:
    branches: [master]
    paths:
      - webapp/**/src/**
      - webapp/pom.xml
      - webapp/*/pom.xml

permissions:
  contents: read

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./webapp
    steps:
      - uses: actions/checkout@v6
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'adopt'
          java-version: '21'
      - name: Compile and install modules
        run: mvn install -DskipTests -B
      - name: Upload local Maven artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-local-modules
          path: ~/.m2/repository/app/mcorg
          retention-days: 1

  unit-tests:
    name: Unit Tests
    needs: compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./webapp
    steps:
      - uses: actions/checkout@v6
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'adopt'
          java-version: '21'
      - name: Restore local Maven artifacts
        uses: actions/download-artifact@v4
        with:
          name: maven-local-modules
          path: ~/.m2/repository/app/mcorg
      - name: Cache Minecraft server data
        uses: actions/cache@v5
        with:
          path: webapp/mc-data/src/test/resources/servers/extracted
          key: minecraft-server-data-${{ hashFiles('webapp/mc-data/src/test/kotlin/app/mcorg/data/minecraft/extract/ServerFileDownloader.kt') }}
          restore-keys: |
            minecraft-server-data-
      - name: Generate JWT signing keys
        working-directory: ./webapp/mc-web
        run: bash create-keys.sh
      - name: Run unit tests
        run: mvn test -B -o -Dmaven.main.skip=true

  integration-tests:
    name: Integration Tests
    needs: compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./webapp
    steps:
      - uses: actions/checkout@v6
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'adopt'
          java-version: '21'
      - name: Restore local Maven artifacts
        uses: actions/download-artifact@v4
        with:
          name: maven-local-modules
          path: ~/.m2/repository/app/mcorg
      - name: Generate JWT signing keys
        working-directory: ./webapp/mc-web
        run: bash create-keys.sh
      - name: Run database tests
        run: mvn test -pl mc-web -Dsurefire.excludedGroups= -Dgroups=database -B -o -Dmaven.main.skip=true
